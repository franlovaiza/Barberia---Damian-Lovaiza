<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Barbero</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: 'Poppins', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: #111;
            background-image:
                linear-gradient(180deg, rgba(10,10,10,0.55) 0%, rgba(10,10,10,0.75) 55%, rgba(10,10,10,0.92) 100%),
                url('ee58f484-4a3b-4333-ac11-bbd824889cbd.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: rgba(20, 20, 20, 0.72);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 156, 79, 0.35);
            border-radius: 16px;
            padding: 36px 32px 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card img.logo {
            max-width: 92px;
            margin-bottom: 14px;
            border-radius: 50%;
            border: 2px solid #c69c4f;
            padding: 4px;
            background: #111;
        }

        .login-card h1 {
            font-family: 'Playfair Display', serif;
            color: #f2e6cf;
            font-size: 1.5rem;
            margin: 0 0 4px;
            letter-spacing: 0.5px;
        }

        .login-card .subtitle {
            color: #b7ac9a;
            font-size: 0.85rem;
            margin: 0 0 24px;
        }

        .field {
            text-align: left;
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            color: #d9cdb4;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Poppins', Arial, sans-serif;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .field input::placeholder { color: #8a8478; }

        .field input:focus {
            outline: none;
            border-color: #c69c4f;
            background: rgba(255,255,255,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 6px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #d9b25f 0%, #a97c2f 100%);
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(201, 156, 79, 0.35);
        }

        .btn-login:active { transform: translateY(0); }

        #mensaje {
            color: #ff9d9d;
            font-size: 0.85rem;
            margin-top: 16px;
            min-height: 1.1em;
        }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: #b7ac9a;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .back-link:hover { color: #d9b25f; }

        @media (max-width: 480px) {
            .login-card { padding: 28px 22px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo1.png" alt="logo" class="logo">
        <h1>Panel del Barbero</h1>
        <p class="subtitle">Ingresá tus credenciales para continuar</p>

        <div class="field">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Tu usuario" autocomplete="username">
        </div>
        <div class="field">
            <label for="clave">Contraseña</label>
            <input type="password" id="clave" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn-login" onclick="login()">Ingresar</button>

        <p id="mensaje"></p>

        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>

<script>
    function login() {
        const usuario = document.getElementById("usuario").value;
        const clave = document.getElementById("clave").value;

        // 👇 Cambiá estos datos por los que quieras
        const usuarioCorrecto = "barberodamian";
        const claveCorrecta = "CarriloboBarberia";

        if (usuario === usuarioCorrecto && clave === claveCorrecta) {
            localStorage.setItem("autenticado", "true");
            window.location.href = "barbero.html";
        } else {
            document.getElementById("mensaje").textContent = "Usuario o contraseña incorrectos.";
        }
    }

    // Permitir enviar el formulario con Enter
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('clave').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('usuario').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    });
</script>

</body>
</html>
